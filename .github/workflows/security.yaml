name: Security

# One visible security entrypoint. The detailed implementations stay in local
# reusable workflows so consumers can pin the same checks by SHA.

on:
  branch_protection_rule:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  iac:
    name: IaC and secret scan
    permissions:
      contents: read
      security-events: write # required to upload IaC and secret-scan SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    uses: nwarila-platform/.github/.github/workflows/reusable-iac-security.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6

  codeql:
    name: CodeQL
    permissions:
      contents: read
      security-events: write # required to upload CodeQL SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    uses: nwarila-platform/.github/.github/workflows/reusable-codeql.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6

  scorecard:
    name: OpenSSF Scorecard
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'merge_group' }}
    permissions:
      security-events: write # required to upload Scorecard SARIF
      id-token: write # required by OpenSSF Scorecard tokenless attestation
      actions: read # required by code-scanning upload metadata
      contents: read
    uses: nwarila-platform/.github/.github/workflows/reusable-scorecard.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6
