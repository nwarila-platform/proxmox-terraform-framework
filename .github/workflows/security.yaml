name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: nwarila-platform/.github/.github/workflows/reusable-iac-security.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6
