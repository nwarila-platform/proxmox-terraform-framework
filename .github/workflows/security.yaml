name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read # required by the reusable scanner to inspect repository content
      security-events: write # required to upload IaC and secret-scan SARIF
      actions: read # required by Trivy/IaC-security SARIF upload to associate results with the run
    uses: nwarila-platform/.github/.github/workflows/reusable-iac-security.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6 # nwarila-platform/.github main @ 2026-06-04
