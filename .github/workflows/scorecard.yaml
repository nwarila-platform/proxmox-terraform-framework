name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      contents: read
      security-events: write
      actions: read
      id-token: write
    uses: nwarila-platform/.github/.github/workflows/reusable-scorecard.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6
