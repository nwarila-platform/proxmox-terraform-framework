name: Template Sync

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: template-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: framework-template / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Drift gate (framework-template baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@dac07c2b2a30a084b3577d4712549291ae99879c # main @ 2026-05-30
        with:
          source-repo: NWarila/terraform-framework-template
          # renovate: depName=NWarila/terraform-framework-template packageName=NWarila/terraform-framework-template
          source-ref: 072ae1cbc288fdcc9b02ecb75e71d18794a07d27 # scaffolded control-plane callers (template #27)
          manifest: baseline-manifest.json
          check-name: framework-template / verify
