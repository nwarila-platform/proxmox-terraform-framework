name: Repo Hygiene
# Caller for the canonical nwarila-platform/.github reusable-repo-hygiene workflow.

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-hygiene-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    permissions:
      contents: read
    uses: nwarila-platform/.github/.github/workflows/reusable-repo-hygiene.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6
    with:
      source_ref: 7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6
