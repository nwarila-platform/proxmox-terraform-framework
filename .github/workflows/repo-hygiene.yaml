name: Repo Hygiene

# Caller for the canonical NWarila/.github repo-hygiene reusable.
# This evaluates universal workflow/pinning policy against this repo without
# mirroring the policy or input-builder locally.

on:
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-hygiene-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    permissions:
      contents: read
    uses: NWarila/.github/.github/workflows/reusable-repo-hygiene.yaml@f45f8e6695d61af2f36ac37b72ef2dcfa05bc089
    with:
      source_ref: f45f8e6695d61af2f36ac37b72ef2dcfa05bc089
