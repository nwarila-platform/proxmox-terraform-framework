name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "30 6 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/.github/.github/workflows/reusable-codeql.yaml@f45f8e6695d61af2f36ac37b72ef2dcfa05bc089
