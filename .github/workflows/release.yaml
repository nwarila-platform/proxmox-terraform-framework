name: Release

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        description: Release task to run.
        required: true
        type: choice
        default: release-please
        options:
          - release-please
          - release-evidence

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    if: ${{ (github.event_name == 'push' && vars.RELEASE_PLEASE_ON_PUSH == 'true') || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-please') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    uses: nwarila-platform/.github/.github/workflows/reusable-release-please.yaml@7093eaad7aa350e3eb3970a90ae3ddfffc6b96c6

  evidence:
    name: Release Evidence
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.task == 'release-evidence') }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    uses: NWarila/terraform-framework-template/.github/workflows/reusable-release-evidence.yaml@3b0a832f38e8057d8531e890a666242dc32cab21
    with:
      # renovate: datasource=github-releases depName=hashicorp/terraform extractVersion=^v(?<version>.*)$ versioning=hashicorp
      terraform_version: "1.15.2"
      repo_type: framework
